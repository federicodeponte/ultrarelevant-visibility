# Render.com deploy config — alternative to Vercel.
# Use this if you want live runs (Render web services have no per-request timeout).
# Bring your own keys via Render env vars.
#
# To deploy:
#   1. Create a new Render account / project from this repo (private).
#   2. Add env vars: GEMINI_API_KEY, NVIDIA_API_KEY (and OPENROUTER_API_KEY if needed).
#   3. Render auto-builds and deploys. URL will be https://ultrarelevant-visibility.onrender.com.
#
# Note: this serves the FastAPI engine at local_engine.py (the live pipeline).
# The current Vercel deploy (cache-only) lives in vercel.json + api/.
services:
  - type: web
    name: ultrarelevant-visibility
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install fastapi uvicorn requests pydantic
    startCommand: uvicorn local_engine:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
    healthCheckPath: /health
